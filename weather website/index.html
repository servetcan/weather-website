<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türkiye Hava Durumu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">Türkiye Hava Durumu</h1>
            <p class="lead text-muted">81 İlin Anlık Atmosfer Verileri</p>
            
            <div class="row justify-content-center mt-4">
                <div class="col-md-6">
                    <input type="text" id="citySearch" class="form-control form-control-lg shadow-sm rounded-pill" placeholder="Şehir ismine göre filtrele...">
                </div>
            </div>
        </header>

        <div id="weather-cards" class="row g-4">
            <div class="text-center w-100 py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Veriler Hazırlanıyor...</p>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>

</body>
</html>
